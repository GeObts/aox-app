<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="#080808"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(247,147,26,0.04)" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="400" rx="40" fill="url(#grid)"/>

  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="40%">
    <stop offset="0%" stop-color="#F7931A" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" rx="40" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="398" height="398" rx="39" fill="none" stroke="#222" stroke-width="1"/>

  <!-- AOX Text -->
  <text x="200" y="215" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="120" letter-spacing="-3">
    <tspan fill="#e8e8e8">A</tspan><tspan fill="#F7931A">O</tspan><tspan fill="#e8e8e8">X</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="275" text-anchor="middle" font-family="Courier New, monospace" font-weight="700" font-size="11" fill="#666" letter-spacing="4">
    AGENT OPPORTUNITY EXCHANGE
  </text>

  <!-- Status -->
  <circle cx="155" cy="310" r="3" fill="#66c800"/>
  <text x="165" y="314" font-family="Courier New, monospace" font-weight="700" font-size="10" fill="#666" letter-spacing="3">
    BASE MAINNET
  </text>
</svg>
